name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: teos
          POSTGRES_PASSWORD: password
          POSTGRES_DB: teos_test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest tests/
        env:
          DATABASE_URL: postgresql+asyncpg://teos:password@localhost:5432/teos_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test
